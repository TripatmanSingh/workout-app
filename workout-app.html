<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack Pro - Workout App</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
    header { background: #1e2937; padding: 20px; text-align: center; }
    h1 { color: #60a5fa; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: #1e2937; border-radius: 12px; padding: 25px; margin: 15px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin: 5px; }
    input, select { padding: 12px; background: #334155; color: white; border: 1px solid #475569; border-radius: 8px; width: 100%; margin: 8px 0; }
    .timer { font-size: 3.5em; font-weight: bold; text-align: center; margin: 20px 0; color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>FitTrack Pro</h1>
    <p>Advanced Workout Tracker</p>
  </header>

  <div class="container">
    <!-- Timer -->
    <div class="card">
      <h2>Workout Timer</h2>
      <div class="timer" id="timer">00:00</div>
      <button onclick="startTimer()">Start Timer</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <!-- Add Exercise -->
    <div class="card">
      <h2>Add Exercise</h2>
      <input type="text" id="exercise" placeholder="Exercise Name">
      <input type="number" id="sets" placeholder="Sets">
      <input type="number" id="reps" placeholder="Reps">
      <input type="number" id="weight" placeholder="Weight (kg)">
      <button onclick="addExercise()">Log Exercise</button>
    </div>

    <!-- Log -->
    <div class="card">
      <h2>Today's Log</h2>
      <div id="log"></div>
      <button onclick="clearLog()">Clear Today's Log</button>
    </div>
  </div>

  <script>
    let log = [];
    let timerInterval;
    let seconds = 0;

    function startTimer() {
      if (!timerInterval) {
        timerInterval = setInterval(() => {
          seconds++;
          const min = Math.floor(seconds / 60);
          const sec = seconds % 60;
          document.getElementById('timer').textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
      }
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function resetTimer() {
      pauseTimer();
      seconds = 0;
      document.getElementById('timer').textContent = "00:00";
    }

    function addExercise() {
      const exercise = document.getElementById('exercise').value;
      const sets = document.getElementById('sets').value;
      const reps = document.getElementById('reps').value;
      const weight = document.getElementById('weight').value;

      if (exercise && sets && reps) {
        log.push({exercise, sets, reps, weight, time: new Date().toLocaleTimeString()});
        displayLog();
      }
    }

    function displayLog() {
      const container = document.getElementById('log');
      container.innerHTML = log.map((item, index) => `
        <div class="card">
          <h3>${item.exercise}</h3>
          <p>Sets: ${item.sets} | Reps: ${item.reps} | Weight: ${item.weight} kg | Time: ${item.time}</p>
        </div>
      `).join('');
    }

    function clearLog() {
      if (confirm("Clear today's log?")) {
        log = [];
        displayLog();
      }
    }
  </script>
</body>
</html>
